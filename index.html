<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GATE Quest</title>
<meta name="description" content="Daily quest tracker for GATE EEE prep — streaks, XP, ranks, calendar, and alerts.">
<meta name="theme-color" content="#0F2A3D">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GATE Quest">
<style>
  :root{
    --bg:#0F2A3D;
    --bg-card:#15374D;
    --bg-card-2:#1B4259;
    --line:rgba(255,255,255,0.08);
    --line-2:rgba(255,255,255,0.14);
    --text:#F2F6F8;
    --text-dim:#9FB4C2;
    --text-faint:#6E8494;
    --accent:#3FB6A8;
    --accent-dim:#2A6E66;
    --warn:#E0A23B;
    --danger:#D9695A;
    --success:#4CA876;
    --phase1:#3F8CB6;
    --phase2:#C98A3F;
    --phase3:#5FA86A;
    --phase4:#9A6BC9;
    --radius-sm:8px;
    --radius-md:12px;
    --radius-lg:16px;
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --nav-h: 60px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  #app{max-width:480px;margin:0 auto;min-height:100vh;padding:0 16px;
    padding-top:calc(env(safe-area-inset-top) + 16px);
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 24px);
  }
  button, select, input{font-family:inherit;}
  button{
    background:var(--bg-card);
    border:1px solid var(--line-2);
    color:var(--text);
    border-radius:var(--radius-sm);
    padding:10px 14px;
    font-size:13px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  button:active{transform:scale(0.97);}
  select{
    background:var(--bg-card);
    border:1px solid var(--line-2);
    color:var(--text);
    border-radius:var(--radius-sm);
    padding:6px 10px;
    font-size:13px;
  }
  input[type=text]{
    background:var(--bg-card);
    border:1px solid var(--line-2);
    color:var(--text);
    border-radius:var(--radius-sm);
    padding:10px 12px;
    font-size:14px;
  }
  ::selection{background:var(--accent-dim);}
  .icon{width:1em;height:1em;display:inline-block;vertical-align:-0.125em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  a{color:var(--accent);}

  #bottom-nav{
    position:fixed;left:0;right:0;bottom:0;
    background:rgba(21,55,77,0.96);
    backdrop-filter:blur(12px);
    border-top:1px solid var(--line-2);
    padding-bottom:env(safe-area-inset-bottom);
    z-index:50;
  }
  #bottom-nav-inner{
    max-width:480px;margin:0 auto;
    display:grid;grid-template-columns:repeat(4,1fr);
    height:var(--nav-h);
  }
  .nav-btn{
    background:transparent;border:none;border-radius:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    color:var(--text-faint);font-size:10.5px;padding:6px 2px;
  }
  .nav-btn.active{color:var(--accent);}
  .nav-btn .icon{width:19px;height:19px;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }
</style>
</head>
<body>
<div id="app"></div>
<nav id="bottom-nav"><div id="bottom-nav-inner"></div></nav>

<script src="data.js"></script>
<script src="schedule.js"></script>
<script src="quotes.js"></script>
<script src="notifications.js"></script>
<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
